# Vizor Suspect-Search — PRODUCTION stack (one isolated deployment per client).
# Self-contained: its own Postgres / Redis / RustFS / MediaMTX / Triton — nothing
# shared. The ONLY host-exposed services are Caddy (443/80, the TLS entry point) and
# MediaMTX's WebRTC media path (required for live video). Data services have NO host
# ports. All secrets come from .env.prod (generated by the installer; never defaults).
#
#   VIZOR_SITE_ADDRESS  e.g. https://192.168.1.50  (installer sets it)
#   Images built by build-images.sh: vizor-people-{frontend,backend}:prod
name: vizor-people

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  # ── TLS reverse proxy — the only web entry point ──
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["${VIZOR_PORT:-5011}:${VIZOR_PORT:-5011}"]
    environment:
      VIZOR_SITE_ADDRESS: ${VIZOR_SITE_ADDRESS:?set VIZOR_SITE_ADDRESS}
      VIZOR_HOST_IP: ${VIZOR_HOST_IP:-127.0.0.1}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [frontend, backend]
    networks: [vizor]

  # ── Next.js standalone UI (internal; served via Caddy) ──
  frontend:
    image: vizor-people-frontend:prod
    restart: unless-stopped
    networks: [vizor]
    healthcheck:   # override image default (which hits IPv6 localhost); server binds IPv4
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── API (gunicorn); GPU visibility only for NVML system-stats ──
  backend:
    image: vizor-people-backend:prod
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      PA_TRITON_URL: triton:8000
      VE_MEDIAMTX_URL: http://mediamtx:9997
      VE_MEDIAMTX_PUBLIC_WEBRTC_BASE: ${VIZOR_SITE_ADDRESS}/webrtc
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: "utility"
    volumes:
      - ./license:/app/license:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [vizor]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, utility]

  # ── Indexing worker (GPU: NVDEC decode + inference) ──
  streams:
    image: vizor-people-backend:prod
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      PA_TRITON_URL: triton:8000
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: "compute,video,utility"
    healthcheck: { disable: true }   # non-HTTP process; the API healthcheck doesn't apply
    command: python -m app.stream_supervisor
    depends_on: [backend, triton, mediamtx]
    networks: [vizor]
    <<: *gpu

  # ── Background tasks (reports, notifications) ──
  worker:
    image: vizor-people-backend:prod
    restart: unless-stopped
    env_file: [.env.prod]
    healthcheck: { disable: true }   # non-HTTP process; the API healthcheck doesn't apply
    command: celery -A edge.tasks.app.celery_app worker -l info
    depends_on: [redis]
    networks: [vizor]

  beat:
    image: vizor-people-backend:prod
    restart: unless-stopped
    env_file: [.env.prod]
    healthcheck: { disable: true }   # non-HTTP process; the API healthcheck doesn't apply
    command: celery -A edge.tasks.app.celery_app beat -l info
    depends_on: [redis]
    networks: [vizor]

  # ── Data services — INTERNAL ONLY (no host ports) ──
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    env_file: [.env.prod]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    networks: [vizor]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [vizor]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 5 }

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    env_file: [.env.prod]
    volumes: ["rustfs_data:/data"]
    networks: [vizor]

  # ── Live media relay — WebRTC media path exposed for browser playback ──
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      MTX_WEBRTCADDITIONALHOSTS: ${VIZOR_HOST_IP:-127.0.0.1}
    ports:
      - "8189:8189/udp"   # WebRTC media (ICE)
    volumes: ["./deploy/mediamtx.yml:/mediamtx.yml"]
    networks: [vizor]

  # ── GPU inference (yolo26) — internal only ──
  triton:
    image: nvcr.io/nvidia/tritonserver:25.06-py3
    restart: unless-stopped
    command: >
      tritonserver
      --model-repository=/models
      --model-control-mode=explicit
      --load-model=yolo26
      --log-verbose=0
      --strict-model-config=false
    volumes: ["./deploy/triton/model_repository:/models:ro"]
    shm_size: "1g"
    networks: [vizor]
    <<: *gpu

networks:
  vizor:
    name: vizor_people

volumes:
  pgdata:
  rustfs_data:
  caddy_data:
  caddy_config:
